<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 | 수지도서관</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fonts-archive/Pretendard/Pretendard.css">
    <link rel="stylesheet" href="../styles/common.css">
    <link rel="stylesheet" href="../styles/sub/login.css">
    <script src="scripts/sub/서브페이지명.js" defer></script>
</head>
<body>

    <div class="container">
        <aside id="aside">
            
        </aside><!-- // #aside End -->
        <section id="main">
            <p class="navi">
                <span>회원정보</span>
                <span>로그인</span>
            </p>
            <h1 class="tit-main">로그인</h1>
            <div class="">
                <div class="">
                    <h2 class="tit-sec">회원로그인</h2>
                    <form>
                        <legend class="blind">회원로그인 정보 입력</legend>
                        <div class="base-form">
                            <label for="userId" class="blind">아이디</label>
                            <input type="text" name="userId" id="userId" placeholder="아이디">
                            <label for="userPwd" class="blind">비밀번호</label>
                            <input type="password" name="userPwd" id="userPwd" placeholder="비밀번호">
                        </div>
                        <button>로그인</button>
                    </form>
                    <p>
                        <span>아이디찾기</span>
                        <span>비밀번호재발급</span>
                        <span>회원가입</span>
                    </p>
                    <p>※ 로그인이 안되시는 경우 한/영키와 Caps Lock키가 눌러져 있지 않은지 확인하세요.</p>
                    <p>※ 자동완성기능을 사용하는 경우 아이디를 선택했을때 공백(space bar)이 들어가는 이유로 로그인이 안될 수 있습니다. 아이디를 직접 정확히 입력한 후 다시 시도해주세요.</p>
                </div>
                <div class="">
                        
                </div>
            </div>
        </section><!-- // #main End -->
    </div><!-- // .container End -->

</body>
</html>
